<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RDOC - Connexion à votre compte">
    <title>Connexion - RDOC</title>
    <link rel="stylesheet" href="assets/css/auth.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#5CC4E5',
                        'bg-dark': '#000000',
                        'text-white': '#FFFFFF',
                        'text-muted': 'rgba(255, 255, 255, 0.7)',
                        'text-dim': 'rgba(255, 255, 255, 0.5)',
                        'glass-bg': 'rgba(255, 255, 255, 0.21)',
                        'glass-border': 'rgba(255, 255, 255, 0.1)',
                    },
                    fontFamily: {
                        'orbitron': ['Orbitron', 'sans-serif'],
                        'inter': ['Inter', 'sans-serif'],
                    },
                    backdropBlur: {
                        '29': '29px',
                    },
                    boxShadow: {
                        'primary': '1px -1px 19.7px 0px #5CC4E5',
                        'primary-lg': '1px -1px 30px 0px #5CC4E5',
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col">
    <!-- Background Pattern -->
    <div class="auth-bg"></div>

    <!-- Header with Logo -->
    <header class="auth-header">
        <div class="max-w-container mx-auto px-6 md:px-16 lg:px-24">
            <a href="index.html" class="logo">
                <img src="assets/images/Plan de travail 1 1.png" alt="RDOC" class="logo-img">
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center py-12 px-4">
        <div class="auth-card glass">
            <div class="text-center mb-8">
                <h1 class="auth-title">Bienvenue</h1>
                <p class="auth-subtitle">Connectez-vous à votre compte RDOC</p>
            </div>

            <form class="auth-form">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="example@gmail.com" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Mot de passe</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="••••••••" 
                        required
                    >
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember" class="checkbox">
                        <span class="checkbox-text">Se souvenir de moi</span>
                    </label>
                    <a href="#" class="forgot-link">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="btn-submit">Se connecter</button>
            </form>

            <div class="auth-footer">
                <p class="footer-text">
                    Pas encore de compte ? 
                    <a href="register.html" class="footer-link">Créer un compte</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="auth-footer-bar">
        <div class="max-w-container mx-auto px-6 md:px-16 lg:px-24">
            <p class="copyright">© 2025 RDOC. Tous droits réservés.</p>
        </div>
    </footer>
</body>
</html>
